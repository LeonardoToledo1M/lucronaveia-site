<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucro Na Veia</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #081225, #02050d);
    color: #ffffff;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    padding: 40px 20px;
}

/* LOGO */
.logo {
    width: 220px;
    margin-bottom: 30px;
}

/* SUBTÍTULO */
.hero p {
    color: #00ff88;
    font-size: 18px;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

/* TÍTULO PRINCIPAL */
.hero h1 {
    font-weight: 800;
    line-height: 1.1;
    max-width: 900px;

    font-size: clamp(40px, 6vw, 96px);
}

/* BOTÃO */
.cta {
    margin-top: 40px;
}

.cta a {
    background: linear-gradient(90deg, #00ff88, #00c853);
    color: #000;
    padding: 16px 28px;
    font-size: 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;

    transition: 0.2s;
}

.cta a:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<section class="hero">

    <img src="logo.png" class="logo">

    <p>MOTOR DE LUCRO PARA DECISÕES RÁPIDAS</p>

    <h1>
        O problema não é vender.<br>
        É perder!
    </h1>

    <div class="cta">
        <a href="#">COMEÇAR AGORA</a>
    </div>

</section>

</body>
</html>
