<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lucro Na Veia</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #cbd5f5;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      background: #22c55e;
      color: #000;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .link {
      display: block;
      margin-top: 20px;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Você sabe quanto realmente sobra no seu negócio?</h1>

    <p>
      A maioria dos empresários acha que tem lucro.<br/>
      Mas está perdendo dinheiro sem perceber.
    </p>

    <a class="btn" href="https://app.lucronaveia.com">
      Começar agora
    </a>

    <a class="link" href="https://app.lucronaveia.com">
      Já tenho conta
    </a>
  </div>
</body>
</html>
